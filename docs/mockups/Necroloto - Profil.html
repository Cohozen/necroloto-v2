<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Necroloto — Profil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Saira+Condensed:wght@500;600;700;800&family=Pixelify+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/necroloto.css">
<style>
  html, body { margin: 0; height: 100%; background: #0b0b0f; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="screens/profile.js"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  const N = window.NECRO;
  const DARK = { background: "#0B0B0F" };
  const S = ({ html }) => <div style={{ width: "100%", height: "100%" }} dangerouslySetInnerHTML={{ __html: html }} />;

  const PALETTE = [
    ["#0B0B0F", "Charbon", "fond"], ["#14141C", "Surface", ""], ["#22222E", "Surface 3", ""],
    ["#39FF6A", "Vert toxique", "primaire", 1], ["#FF2E97", "Magenta", "secondaire", 1], ["#FF5A3C", "Corail", "alertes", 1],
    ["#F3F4F8", "Ink", "texte", 1], ["#9B9CAC", "Muted", ""], ["#5E5F6E", "Dim", ""],
  ];
  function PaletteBoard() {
    return (
      <div style={{ padding: "28px 30px", background: "#0B0B0F", height: "100%", boxSizing: "border-box", fontFamily: "Space Grotesk, sans-serif", color: "#F3F4F8" }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".16em", textTransform: "uppercase", color: "#5E5F6E", marginBottom: 16 }}>Palette — codes hex</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12 }}>
          {PALETTE.map(([hex, name, role, dark]) => (
            <div key={hex} style={{ background: hex, color: dark ? "#0A1C10" : "#F3F4F8", border: "1px solid rgba(255,255,255,.08)", borderRadius: 13, padding: 14, minHeight: 92, display: "flex", flexDirection: "column", justifyContent: "flex-end", gap: 4 }}>
              <b style={{ fontSize: 13 }}>{name}</b>
              <code style={{ fontFamily: "Space Mono, monospace", fontSize: 11.5, opacity: .85 }}>{hex}</code>
              {role ? <span style={{ fontSize: 11, opacity: .7 }}>{role}</span> : null}
            </div>
          ))}
        </div>
      </div>
    );
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="profil" title="Profil — cockpit du joueur" subtitle="En-tête avatar + halo néon, stats gamifiées, badges arcade, réglages & déconnexion. Onglet Profil actif.">
          <DCArtboard id="prof-d" label="Desktop · 1280" width={1280} height={732} style={DARK}>
            <S html={N.profileDesktop()} />
          </DCArtboard>
          <DCArtboard id="prof-m" label="Mobile · 390" width={390} height={980} style={DARK}>
            <S html={N.profileMobile()} />
          </DCArtboard>
        </DCSection>

        <DCSection id="palette" title="Palette" subtitle="Codes hex du système néon / arcade">
          <DCArtboard id="pal" label="Palette" width={560} height={420} style={DARK}>
            <PaletteBoard />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
