<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Necroloto — Mes cercles (hub)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Saira+Condensed:wght@500;600;700;800&family=Pixelify+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/necroloto.css">
<style>
  html, body { margin: 0; height: 100%; background: #0b0b0f; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="screens/circles.js"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  const N = window.NECRO;
  const DARK = { background: "#0B0B0F" };
  const S = ({ html }) => <div style={{ width: "100%", height: "100%" }} dangerouslySetInnerHTML={{ __html: html }} />;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="rempli" title="État rempli" subtitle="Cartes de cercle : nom, badge privé/public, membres, mon rang, aperçu du podium">
          <DCArtboard id="hub-d" label="Desktop · 1280" width={1280} height={884} style={DARK}>
            <S html={N.hubDesktop()} />
          </DCArtboard>
          <DCArtboard id="hub-m" label="Mobile · 390" width={390} height={844} style={DARK}>
            <S html={N.hubMobile()} />
          </DCArtboard>
        </DCSection>

        <DCSection id="vide" title="État vide" subtitle="Aucun cercle encore — illustration arcade + CTA Créer / Rejoindre via code">
          <DCArtboard id="empty-d" label="Desktop · 1280" width={1280} height={628} style={DARK}>
            <S html={N.emptyDesktop()} />
          </DCArtboard>
          <DCArtboard id="empty-m" label="Mobile · 390" width={390} height={844} style={DARK}>
            <S html={N.emptyMobile()} />
          </DCArtboard>
        </DCSection>

        <DCSection id="composant" title="Composant — carte de cercle" subtitle="Le composant livrable et ses trois états dérivés des mêmes données">
          <DCArtboard id="spec" label="Carte de cercle · états" width={1280} height={620} style={DARK}>
            <S html={N.cardSpec()} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
